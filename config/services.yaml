# config/services.yaml
services:
    _defaults:
        autowire: true          # Automatically injects dependencies in your services.
        autoconfigure: true     # Automatically registers your services as commands, event subscribers, etc.
        public: false           # Allows optimizing the container by removing unused services; this also means
                                # fetching services directly from the container via $container->get() won't work.
                                # The best practice is to be explicit about your dependencies anyway.
        bind:
            #$projectDir: '%kernel.project_dir%'

    Heimseiten\ContaoCustomContaoBundle\:
        resource: ../src/
        exclude: ../src/{DependencyInjection,Model,Session}

    Heimseiten\ContaoCustomContaoBundle\EventListener\ParseTemplateListener:
        arguments:
            - '@security.helper'
            - '@contao.framework'
        tags:
            - { name: contao.hook, hook: parseTemplate }

    # generatePage (klassisch) wird per #[AsHook] autokonfiguriert; das LayoutEvent
    # (modern) hier als String-Tag, damit Contao\CoreBundle\Event\LayoutEvent auf
    # Contao 4.13 nicht aufgelöst werden muss.
    Heimseiten\ContaoCustomContaoBundle\EventListener\AddLayoutAssetsListener:
        tags:
            - { name: kernel.event_listener, event: 'Contao\CoreBundle\Event\LayoutEvent', method: onLayout }
